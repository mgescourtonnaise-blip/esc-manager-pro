<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Étoile Sportive Courtonnaise</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>
<header>
    <img src="logo.png" alt="ESC Logo" class="logo">
    <h1>Étoile Sportive Courtonnaise ⚽</h1>
    <p>L'application officielle du club</p>
</header>

<main>
    <section id="admin-section">
        <button id="login-btn">Connexion Admin</button>
    </section>

    <section id="players-section">
        <h2>Joueurs</h2>
        <div id="players-list"></div>
    </section>

    <section id="matches-section">
        <h2>Calendrier des matchs</h2>
        <div id="matches-list"></div>
    </section>

    <section id="rankings-section">
        <h2>Classements</h2>
        <div id="rankings-list"></div>
    </section>

    <section id="team-of-month-section">
        <h2>Équipe du Mois</h2>
        <div id="team-of-month-list"></div>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
