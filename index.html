<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESC Manager</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<header>

<h1>⭐ ESC Manager</h1>

<button onclick="loginAdmin()">Admin</button>

<input type="file" accept=".xlsx" onchange="importExcel(event)">

</header>

<nav>

<button onclick="showTab('players')">Joueurs</button>
<button onclick="showTab('matches')">Matchs</button>
<button onclick="showTab('scorers')">Buteurs</button>

</nav>

<main id="content"></main>

<script src="excel.js"></script>
<script src="app.js"></script>

</body>
</html>
